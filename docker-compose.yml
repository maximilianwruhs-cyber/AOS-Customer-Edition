services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: aos-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: aos_rag
      POSTGRES_USER: aos
      POSTGRES_PASSWORD: aos_local_dev
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aos -d aos_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
